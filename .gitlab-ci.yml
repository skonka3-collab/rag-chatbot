stages:
  - format
  - lint
  - type_check
  - test
  - coverage
  - security

default:
  image: python:3.11
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements-dev.txt

format:
  stage: format
  script:
    - ruff format --check .

lint:
  stage: lint
  script:
    - ruff check .
    - flake8 app.py tests
    - pylint --exit-zero app.py tests
    - vulture app.py tests --min-confidence 100
    - pyupgrade --py311-plus app.py tests/*.py

type_check:
  stage: type_check
  script:
    - mypy .

test:
  stage: test
  script:
    - pytest

coverage:
  stage: coverage
  script:
    - pytest --cov=app --cov-report=term-missing --cov-report=xml
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml

secret_scanning:
  stage: security
  script:
    - detect-secrets-hook --baseline .secrets.baseline --exclude-files .secrets.baseline $(git ls-files)

dependency_audit:
  stage: security
  script:
    - python -m pip_audit -r requirements.txt --no-deps --disable-pip

sast:
  stage: security
  script:
    - bandit -q -r app.py
    - semgrep --config .semgrep.yml --error --metrics=off app.py
