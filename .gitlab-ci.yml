stages:
  - format
  - lint
  - type_check
  - test

image: python:3.11

default:
  before_script:
    - python -m pip install --upgrade pip
    - pip install -r requirements-dev.txt || pip install --no-cache-dir ruff flake8 pylint vulture pyupgrade mypy pytest pytest-cov detect-secrets pip-audit bandit semgrep

format:
  stage: format
  script:
    - ruff format --check .

lint:
  stage: lint
  script:
    - ruff check .
    - flake8 app.py tests
    - pylint --exit-zero app.py tests
    - vulture app.py tests --min-confidence 100
    - pyupgrade --py311-plus app.py
    - detect-secrets-hook --baseline .secrets.baseline --exclude-files .secrets.baseline || true
    - python -m pip_audit -r requirements.txt --no-deps --disable-pip || true
    - bandit -q -r app.py
    - semgrep --config auto --error --metrics=off app.py || true

type_check:
  stage: type_check
  script:
    - mypy .

test:
  stage: test
  script:
    - pytest --cov=app --cov-report=term-missing --cov-report=xml
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+%)/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml