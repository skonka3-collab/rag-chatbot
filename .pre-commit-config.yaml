repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff formatter
        entry: ruff format
        stages: [pre-commit]
        language: system
        types: [python]

      - id: ruff-lint
        name: ruff linter
        entry: ruff check --fix
        stages: [pre-commit]
        language: system
        types: [python]

      - id: mypy
        name: mypy checks
        entry: mypy .
        stages: [pre-commit]
        language: system
        types: [python]
        pass_filenames: false

      - id: pytest
        name: pytest testing
        entry: pytest --cov=app --cov-report=term-missing
        stages: [pre-commit]
        language: system
        pass_filenames: false
        always_run: true

      - id: detect-secrets
        name: secret scanning
        entry: detect-secrets-hook --baseline .secrets.baseline --exclude-files .secrets.baseline
        stages: [pre-commit]
        language: system

      - id: pip-audit
        name: dependency audit
        entry: python -m pip_audit -r requirements.txt --no-deps --disable-pip
        stages: [pre-commit]
        language: system
        pass_filenames: false

      - id: bandit
        name: security scan
        entry: bandit -q -r app.py
        stages: [pre-commit]
        language: system
        pass_filenames: false
