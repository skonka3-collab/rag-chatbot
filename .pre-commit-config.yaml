repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff formatter
        entry: ruff format
        stages: [pre-commit]
        language: system
        types: [python]
      - id: ruff
        name: ruff linter
        entry: ruff check --fix
        stages: [pre-commit]
        language: system
        types: [python]
      - id: mypy
        name: mypy checks
        entry: mypy .
        stages: [pre-commit]
        language: system
        types: [python]
        pass_filenames: false
      - id: pytest
        name: pytest testing
        entry: pytest
        stages: [pre-push]
        language: system
        types: [python]
        pass_filenames: false
        